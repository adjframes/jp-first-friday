<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venues — JP First Fridays</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Project styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header (compact) -->
  <header class="site-header site-header--compact">
    <div class="header-banner-wrap"><img src="logo.png" alt="JP First Fridays" class="header-banner"></div>
    <div class="container header-content">
      <div class="header-top">
        <div class="header-left">
          <nav class="site-nav">
            <a href="index.html">Home</a>
            <a href="venues.html" class="nav-link--active">Venues</a>
            <a href="contact.html">Contact</a>
          </nav>
          <p class="header-tagline">First Friday of every month</p>
          <p class="description">
            Galleries and art spaces in Jamaica Plain open their doors for an evening
            of art, community, and conversation.
          </p>
        </div>
        <div class="header-next-date" id="next-date-box">
          <span class="next-label" id="next-label">Coming up</span>
          <span class="next-date" id="next-date"></span>
          <span class="next-time">5:30 &ndash; 8:30 pm</span>
          <a class="next-cal" id="next-cal" href="#" target="_blank" rel="noopener">+ Google Calendar</a>
        </div>
      </div>
    </div>
  </header>

  <!-- Venue Cards -->
  <section class="venues-section">
    <div class="container">
      <h2>Venues</h2>
      <div id="venues-grid" class="gallery-grid">
        <!-- Cards rendered by venues.js -->
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-overlay"></div>
    <div class="container footer-content">
      <p class="footer-name">JP First Fridays</p>
      <p class="footer-location">Jamaica Plain, Boston, MA</p>
    </div>
  </footer>

  <!-- PapaParse -->
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- Venues script -->
  <script src="venues.js"></script>
  <script src="header.js"></script>
</body>
</html>
